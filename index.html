<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f75d5d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Invoice Villa">
<title>Blissful Villa - Invoice Generator</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root {
    --primary: #f75d5d;
    --primary-light: #fcd4d4;
    --bg: #f5f5f5;
    --card: #ffffff;
    --text: #333333;
    --text-light: #777777;
    --accent: #d4ecf7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .app-header {
    background: var(--primary);
    color: white;
    padding: 16px 20px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .app-header h1 { font-size: 1.3rem; font-weight: 700; }
  .app-header p { font-size: 0.8rem; opacity: 0.9; margin-top: 2px; }
  .container { max-width: 480px; margin: 0 auto; padding: 16px; }
  .form-card {
    background: var(--card);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .form-card h2 {
    font-size: 0.95rem;
    color: var(--primary);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text-light);
    margin-bottom: 5px;
  }
  .form-group input, .form-group select {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    font-size: 0.95rem;
    transition: border-color 0.2s;
    background: white;
    color: var(--text);
  }
  .form-group input:focus, .form-group select:focus {
    outline: none;
    border-color: var(--primary);
  }
  .row { display: flex; gap: 12px; }
  .row .form-group { flex: 1; }
  .dp-section { display: none; }
  .dp-section.active { display: block; }
  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-outline {
    background: white;
    color: var(--primary);
    border: 2px solid var(--primary);
    margin-top: 10px;
  }
  .btn-group { margin-top: 8px; }
  .summary-box {
    background: var(--primary-light);
    border-radius: 10px;
    padding: 14px;
    margin-top: 10px;
  }
  .summary-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 0.9rem;
  }
  .summary-row.total {
    font-weight: 700;
    font-size: 1rem;
    border-top: 1px solid rgba(0,0,0,0.1);
    padding-top: 8px;
    margin-top: 4px;
    color: var(--primary);
  }
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #333;
    color: white;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 0.85rem;
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  @media (max-width: 480px) {
    .container { padding: 12px; }
    .form-card { padding: 16px; }
  }
</style>
</head>
<body>

<div class="app-header">
  <h1>🏠 Blissful Villa</h1>
  <p>Invoice Generator</p>
</div>

<div class="container">
  <div class="form-card">
    <h2>👤 Data Customer</h2>
    <div class="form-group">
      <label>Nama Customer</label>
      <input type="text" id="namaCustomer" placeholder="Contoh: Kak Frinka">
    </div>
    <div class="form-group">
      <label>Lokasi Customer</label>
      <input type="text" id="lokasiCustomer" placeholder="Contoh: Surabaya">
    </div>
  </div>

  <div class="form-card">
    <h2>🏡 Detail Sewa Villa</h2>
    <div class="form-group">
      <label>Harga Sewa Villa (per malam)</label>
      <input type="text" id="hargaSewa" inputmode="numeric" placeholder="Contoh: 1.100.000">
    </div>
    <div class="row">
      <div class="form-group">
        <label>Tanggal Check In</label>
        <input type="date" id="tglCheckin">
      </div>
      <div class="form-group">
        <label>Tanggal Check Out</label>
        <input type="date" id="tglCheckout">
      </div>
    </div>
    <div class="form-group">
      <label>Jumlah Malam</label>
      <input type="text" id="jmlMalam" readonly placeholder="Otomatis">
    </div>
  </div>

  <div class="form-card">
    <h2>💳 Pembayaran</h2>
    <div class="form-group">
      <label>Tanggal Pembayaran</label>
      <input type="date" id="tglBayar">
    </div>
    <div class="form-group">
      <label>Jenis Pembayaran</label>
      <select id="jenisBayar">
        <option value="dp">DP (Down Payment)</option>
        <option value="full">Full Payment</option>
      </select>
    </div>
    <div class="dp-section active" id="dpSection">
      <div class="form-group">
        <label>Nominal DP</label>
        <input type="text" id="besaranDp" inputmode="numeric" placeholder="Contoh: 250.000">
      </div>
    </div>
    <div class="summary-box">
      <div class="summary-row">
        <span>Total Sewa</span>
        <span id="sumTotal">Rp0</span>
      </div>
      <div class="summary-row" id="sumDpRow">
        <span id="sumDpLabel">DP (30%)</span>
        <span id="sumDp">Rp0</span>
      </div>
      <div class="summary-row total" id="sumSisaRow">
        <span>Sisa Pembayaran</span>
        <span id="sumSisa">Rp0</span>
      </div>
    </div>
  </div>

  <div class="btn-group">
    <button class="btn btn-primary" id="btnGenerate" onclick="generatePDF()">
      📄 Download Invoice PDF
    </button>
    <button class="btn btn-outline" onclick="resetForm()">
      🔄 Reset Form
    </button>
  </div>
  <div style="height: 30px;"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  function formatRp(num) {
    return 'Rp' + Number(num).toLocaleString('id-ID');
  }

  function formatNumberInput(input) {
    var val = input.value.replace(/\D/g, '');
    input.value = val ? Number(val).toLocaleString('id-ID') : '';
  }

  function parseNumber(str) {
    return Number(String(str).replace(/\D/g, '')) || 0;
  }

  var hariNama = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  var bulanNama = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

  function formatTglIndo(dateStr) {
    if (!dateStr) return '-';
    var d = new Date(dateStr + 'T00:00:00');
    return hariNama[d.getDay()] + ', ' + d.getDate().toString().padStart(2,'0') + ' ' + bulanNama[d.getMonth()] + ' ' + d.getFullYear();
  }

  function formatTglShort(dateStr) {
    if (!dateStr) return '-';
    var d = new Date(dateStr + 'T00:00:00');
    return d.getDate().toString().padStart(2,'0') + ' ' + bulanNama[d.getMonth()] + ' ' + d.getFullYear();
  }

  function todayStr() {
    var d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function calcNights() {
    var ci = document.getElementById('tglCheckin').value;
    var co = document.getElementById('tglCheckout').value;
    if (ci && co) {
      var diff = Math.max(0, Math.round((new Date(co) - new Date(ci)) / 86400000));
      document.getElementById('jmlMalam').value = diff > 0 ? diff : '';
      return diff;
    }
    document.getElementById('jmlMalam').value = '';
    return 0;
  }

  function updateSummary() {
    var harga = parseNumber(document.getElementById('hargaSewa').value);
    var nights = calcNights();
    var total = harga * (nights || 1);
    var jenis = document.getElementById('jenisBayar').value;
    var dpAmount = parseNumber(document.getElementById('besaranDp').value);
    document.getElementById('sumTotal').textContent = formatRp(total);
    if (jenis === 'full') {
      document.getElementById('sumDpRow').style.display = 'none';
      document.getElementById('sumSisaRow').style.display = 'none';
    } else {
      document.getElementById('sumDpRow').style.display = '';
      document.getElementById('sumSisaRow').style.display = '';
      var dpPct = total > 0 ? Math.round(dpAmount / total * 100) : 0;
      document.getElementById('sumDpLabel').textContent = 'DP (' + dpPct + '%)';
      document.getElementById('sumDp').textContent = formatRp(dpAmount);
      document.getElementById('sumSisa').textContent = formatRp(total - dpAmount);
    }
  }

  document.getElementById('jenisBayar').addEventListener('change', function() {
    document.getElementById('dpSection').classList.toggle('active', this.value === 'dp');
    updateSummary();
  });
  document.getElementById('hargaSewa').addEventListener('input', function() {
    formatNumberInput(this);
    updateSummary();
  });
  document.getElementById('tglCheckin').addEventListener('change', updateSummary);
  document.getElementById('tglCheckout').addEventListener('change', updateSummary);
  document.getElementById('besaranDp').addEventListener('input', function() {
    formatNumberInput(this);
    updateSummary();
  });

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, 2500);
  }

  function validate() {
    var fields = [
      { id: 'namaCustomer', label: 'Nama Customer' },
      { id: 'lokasiCustomer', label: 'Lokasi Customer' },
      { id: 'hargaSewa', label: 'Harga Sewa' },
      { id: 'tglCheckin', label: 'Tanggal Check In' },
      { id: 'tglCheckout', label: 'Tanggal Check Out' },
      { id: 'tglBayar', label: 'Tanggal Pembayaran' },
    ];
    var jenis = document.getElementById('jenisBayar').value;
    if (jenis === 'dp') {
      fields.push({ id: 'besaranDp', label: 'Nominal DP' });
    }
    for (var i = 0; i < fields.length; i++) {
      if (!document.getElementById(fields[i].id).value.trim()) {
        showToast('Mohon isi ' + fields[i].label);
        document.getElementById(fields[i].id).focus();
        return false;
      }
    }
    if (new Date(document.getElementById('tglCheckout').value) <= new Date(document.getElementById('tglCheckin').value)) {
      showToast('Tanggal Check Out harus setelah Check In');
      return false;
    }
    return true;
  }

  function buildInvoiceHTML(d) {
    var dpRow = '';
    var summaryHTML = '';
    if (d.jenis === 'dp') {
      dpRow = '<tr><td colspan="3" style="padding:18px 14px;border-bottom:none;">Pembayaran DP ' + d.dpPct + '%</td>' +
              '<td style="padding:18px 14px;text-align:right;border-bottom:none;">' + formatRp(d.dpAmount) + '</td></tr>';
      summaryHTML =
        '<div style="display:flex;justify-content:space-between;padding:5px 10px;"><span><b>Total</b></span><span>' + formatRp(d.total) + '</span></div>' +
        '<div style="display:flex;justify-content:space-between;padding:5px 10px;"><span><b>DP</b></span><span>' + formatRp(d.dpAmount) + '</span></div>' +
        '<div style="display:flex;justify-content:space-between;padding:8px 10px;margin-top:2px;background:#d4ecf7;font-weight:700;font-style:italic;"><span>Sisa Pembayaran</span><span>' + formatRp(d.sisa) + '</span></div>';
    } else {
      summaryHTML =
        '<div style="display:flex;justify-content:space-between;padding:8px 10px;background:#d4ecf7;font-weight:700;font-style:italic;"><span>Total Pembayaran</span><span>' + formatRp(d.total) + '</span></div>';
    }

    var logoSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="80" height="64"><rect width="400" height="320" rx="20" fill="#555"/><g transform="translate(200,145)" stroke="#f75d5d" stroke-width="6" stroke-linecap="round" fill="none"><line x1="0" y1="-65" x2="0" y2="-85"/><line x1="30" y1="-58" x2="40" y2="-76"/><line x1="55" y1="-38" x2="72" y2="-50"/><line x1="-30" y1="-58" x2="-40" y2="-76"/><line x1="-55" y1="-38" x2="-72" y2="-50"/><line x1="68" y1="-10" x2="85" y2="-14"/><line x1="-68" y1="-10" x2="-85" y2="-14"/></g><path d="M110,170 Q150,90 200,85 Q250,90 290,170 Z" fill="#f75d5d"/><path d="M148,170 L165,148 L180,162 L200,142 L220,162 L235,148 L252,170 Z" fill="#555"/><text x="200" y="225" text-anchor="middle" font-family="Arial Black,Impact,sans-serif" font-weight="900" font-size="48" fill="white" letter-spacing="3">BLISSFUL</text><text x="200" y="275" text-anchor="middle" font-family="Georgia,serif" font-weight="400" font-size="40" fill="white" font-style="italic">villa</text></svg>';

    return '<div style="width:794px;height:1123px;font-family:Segoe UI,Arial,sans-serif;color:#333;background:white;display:flex;flex-direction:column;">' +
      '<div style="background:#f75d5d;text-align:center;padding:18px 20px 14px;display:flex;align-items:center;justify-content:center;gap:16px;">' +
        logoSvg +
        '<div style="font-family:Georgia,serif;font-size:36px;color:white;font-weight:700;font-style:italic;letter-spacing:2px;">Blissful Villa</div>' +
      '</div>' +
      '<div style="background:#fcd4d4;text-align:center;padding:10px 20px;letter-spacing:14px;font-size:16px;font-weight:700;color:#333;">I N V O I C E</div>' +
      '<div style="flex:1;">' +
        '<div style="display:flex;justify-content:space-between;padding:20px 40px 14px;font-size:14px;line-height:1.7;">' +
          '<div>Kepada Yth:<br>Kak ' + d.nama + '<br>di ' + d.lokasi + '</div>' +
          '<div style="text-align:right;">Telah terima pembayaran ☐<br>' + d.jenisLabel + ' pada<br>' + d.tglBayarF + '</div>' +
        '</div>' +
        '<table style="width:714px;margin:10px 40px;border-collapse:collapse;font-size:13.5px;">' +
          '<thead><tr>' +
            '<th style="background:#fcd4d4;padding:10px 14px;font-size:14px;font-weight:700;text-align:left;border-bottom:1.5px solid #ccc;width:40%;">Keterangan</th>' +
            '<th style="background:#fcd4d4;padding:10px 14px;font-size:14px;font-weight:700;text-align:center;border-bottom:1.5px solid #ccc;width:20%;">Harga</th>' +
            '<th style="background:#fcd4d4;padding:10px 14px;font-size:14px;font-weight:700;text-align:center;border-bottom:1.5px solid #ccc;width:15%;">Jml hari</th>' +
            '<th style="background:#fcd4d4;padding:10px 14px;font-size:14px;font-weight:700;text-align:right;border-bottom:1.5px solid #ccc;width:25%;">Total</th>' +
          '</tr></thead>' +
          '<tbody>' +
          '<tr>' +
            '<td style="padding:12px 14px;border-bottom:1px solid #eee;">Sewa Tgl ' + d.tglCiShort + '</td>' +
            '<td style="padding:12px 14px;border-bottom:1px solid #eee;text-align:center;">' + formatRp(d.harga) + '</td>' +
            '<td style="padding:12px 14px;border-bottom:1px solid #eee;text-align:center;">' + d.nights + '</td>' +
            '<td style="padding:12px 14px;border-bottom:1px solid #eee;text-align:right;">' + formatRp(d.total) + '</td>' +
          '</tr>' + dpRow +
          '</tbody></table>' +
        '<div style="padding:10px 0;font-size:13.5px;font-style:italic;border-top:1px solid #999;margin:6px 40px 0;"><i>Check in <b>' + d.tglCiFull + '</b> - Check out <b>' + d.tglCoFull + '</b></i></div>' +
        '<div style="width:280px;margin:30px 40px 0 auto;font-size:14px;">' + summaryHTML + '</div>' +
      '</div>' +
      '<div style="background:#f75d5d;color:white;text-align:center;padding:24px 40px;font-size:18px;font-weight:700;font-style:italic;line-height:1.6;">Terima kasih dan selamat berlibur bersama<br>keluarga tercinta di Kota Wisata Batu</div>' +
    '</div>';
  }

  function generatePDF() {
    if (!validate()) return;
    var btn = document.getElementById('btnGenerate');
    btn.disabled = true;
    btn.innerHTML = '⏳ Membuat PDF...';

    var nama = document.getElementById('namaCustomer').value.trim();
    var lokasi = document.getElementById('lokasiCustomer').value.trim();
    var harga = parseNumber(document.getElementById('hargaSewa').value);
    var tglCheckin = document.getElementById('tglCheckin').value;
    var tglCheckout = document.getElementById('tglCheckout').value;
    var tglBayar = document.getElementById('tglBayar').value;
    var jenis = document.getElementById('jenisBayar').value;
    var nights = calcNights();
    var total = harga * nights;
    var dpAmount = jenis === 'dp' ? parseNumber(document.getElementById('besaranDp').value) : total;
    var dpPct = total > 0 ? Math.round(dpAmount / total * 100) : 0;
    var sisa = total - dpAmount;

    var invoiceHTML = buildInvoiceHTML({
      nama: nama, lokasi: lokasi, harga: harga, nights: nights, total: total,
      jenis: jenis, dpPct: dpPct, dpAmount: dpAmount, sisa: sisa,
      jenisLabel: jenis === 'dp' ? 'DP Booking Villa' : 'Full Payment Booking Villa',
      tglBayarF: formatTglIndo(tglBayar),
      tglCiShort: formatTglShort(tglCheckin),
      tglCiFull: formatTglIndo(tglCheckin),
      tglCoFull: formatTglIndo(tglCheckout)
    });

    var container = document.createElement('div');
    container.style.cssText = 'position:fixed;left:0;top:0;width:794px;height:1123px;overflow:hidden;pointer-events:none;z-index:-9999;opacity:0.01;';
    container.innerHTML = invoiceHTML;
    document.body.appendChild(container);

    var el = container.firstChild;
    var fileName = 'Invoice_' + nama.replace(/\s+/g, '_') + '_' + tglCheckin + '.pdf';

    html2pdf().set({
      margin: 0,
      filename: fileName,
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2, useCORS: true, width: 794, height: 1123, windowWidth: 794, scrollX: 0, scrollY: 0 },
      jsPDF: { unit: 'px', format: [794, 1123], orientation: 'portrait', hotfixes: ['px_scaling'] }
    }).from(el).save().then(function() {
      document.body.removeChild(container);
      btn.disabled = false;
      btn.innerHTML = '📄 Download Invoice PDF';
      showToast('✅ Invoice berhasil di-download!');
    }).catch(function() {
      if (container.parentNode) document.body.removeChild(container);
      btn.disabled = false;
      btn.innerHTML = '📄 Download Invoice PDF';
      showToast('❌ Gagal membuat PDF');
    });
  }

  function resetForm() {
    document.getElementById('namaCustomer').value = '';
    document.getElementById('lokasiCustomer').value = '';
    document.getElementById('hargaSewa').value = '1.100.000';
    document.getElementById('tglCheckin').value = '';
    document.getElementById('tglCheckout').value = '';
    document.getElementById('tglBayar').value = todayStr();
    document.getElementById('jenisBayar').value = 'dp';
    document.getElementById('besaranDp').value = '';
    document.getElementById('jmlMalam').value = '';
    document.getElementById('dpSection').classList.add('active');
    updateSummary();
    showToast('Form berhasil direset');
  }

  // Set defaults on load
  document.getElementById('hargaSewa').value = '1.100.000';
  document.getElementById('tglBayar').value = todayStr();
  updateSummary();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(function(){});
  }
</script>
</body>
</html>
